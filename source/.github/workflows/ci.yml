name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Versão do pnpm vem do campo "packageManager" do package.json (evita conflito:
      # se passarmos `version` aqui E houver packageManager, a action falha).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Testes incluem o anti-vazamento de tenant (RLS). Roda contra Postgres se houver
      # DATABASE_URL nos secrets; sem ele, o suite de RLS é PULADO (não falha o build).
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: pnpm build
