name: CI

# O app fica em source/. O GitHub só executa workflow da RAIZ do repo, por isso este arquivo mora
# aqui (e não em source/.github). Os comandos rodam dentro de source/ via working-directory.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v4

      # Lê a versão do pnpm do packageManager em source/package.json.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: source/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # Testes incluem o anti-vazamento de tenant (RLS). Roda contra Postgres se houver
      # DATABASE_URL nos secrets; sem ele, o suite de RLS é PULADO (não falha o build).
      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: pnpm build
        env:
          CI: 'true'
