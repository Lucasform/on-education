name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1' # segunda de manhã

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Garante que nenhum segredo foi commitado (equivale ao "nada em código" do padrão AWS).
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: source
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: source/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: source/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      # Relatório de vulnerabilidades (não bloqueia o fluxo; serve para revisão).
      - name: Audit (high+)
        run: pnpm audit --audit-level high
        continue-on-error: true
